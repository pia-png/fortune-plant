<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" contents="width=device-width, initial-scale=1.0">
    <title>Fortune Plant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>water the fortune plant!</h1>
        <img id="plant" src="assets/seed.png" alt="fortune plant">

        <div class="progress-bar">
            <div id="progress" style="width: 0%"></div>
        </div>

        <button id="water-btn">give water</button>

        <div id="fortune-box" class="hidden">
            <h3>your fortune:</h3>
            <p id="fortune-text"></p>
        </div>

    </div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    
    <script src="script.js"></script>

</body>

</html>
